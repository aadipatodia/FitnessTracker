services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitai
      POSTGRES_PASSWORD: fitai
      POSTGRES_DB: fitai_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitai -d fitai_coach"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
